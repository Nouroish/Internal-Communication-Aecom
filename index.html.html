<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AECOM Announcements Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00AB61;--t:#009A9B;--s:#B2B1A7;--y:#FFCE00;--r:#E52713;--f:#C81A78;--dk:#1a1a1a;--mu:#6b6560;--br:#d8e8df}
body{font-family:"Tajawal",sans-serif;background:#eef5f1;min-height:100vh;direction:rtl}
.hdr{background:#fff;border-bottom:3px solid var(--g);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,171,97,.07)}
.hdr-logo{height:24px;width:auto}
.ltog{display:flex;border:1.5px solid var(--g);border-radius:8px;overflow:hidden}
.lbtn{padding:5px 13px;font-family:"Tajawal",sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;background:#fff;color:var(--g);border:none;transition:all .2s}
.lbtn.on{background:var(--g);color:#fff}
.main{max-width:620px;margin:0 auto;padding:20px 14px 80px}
.slbl{font-size:.71rem;font-weight:700;color:var(--mu);letter-spacing:.06em;margin-bottom:8px}
.cat-tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.ct{padding:7px 16px;border:2px solid var(--br);border-radius:20px;background:#fff;font-family:"Tajawal",sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--mu);transition:all .2s;white-space:nowrap}
.ct:hover{border-color:var(--g);color:var(--g)}
.ct.on{border-color:var(--g);background:var(--g);color:#fff}
.occ-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.occ-card{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:10px;cursor:pointer;border:2px solid var(--br);background:#fff;transition:all .2s}
.occ-card:hover,.occ-card.on{border-color:var(--g);background:#f0fbf5}
.occ-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.occ-name{font-size:.78rem;font-weight:600;color:var(--dk)}
.fc{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,171,97,.06);border:1px solid var(--br);margin-bottom:16px}
.fc-title{font-size:.94rem;font-weight:700;color:var(--dk);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--br)}
.srow{display:flex;gap:7px;margin-bottom:13px}
.sbtn{flex:1;padding:9px;border:2px solid var(--br);border-radius:9px;background:#fafafa;font-family:"Tajawal",sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--mu);text-align:center;transition:all .2s;user-select:none}
.sbtn.on{border-color:var(--g);background:var(--g);color:#fff}
.field{margin-bottom:10px}
.field label{display:block;font-size:.73rem;font-weight:600;color:var(--mu);margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1.5px solid var(--br);border-radius:8px;font-family:"Tajawal",sans-serif;font-size:.86rem;color:var(--dk);background:#fafafa;outline:none;transition:border .2s}
.field textarea{resize:vertical;min-height:70px;line-height:1.6}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g);background:#fff}
.grow-row{display:flex;gap:7px}
.gbtn{flex:1;padding:8px;border:1.5px solid var(--br);border-radius:8px;background:#fafafa;font-family:"Tajawal",sans-serif;font-size:.78rem;cursor:pointer;color:var(--mu);text-align:center;transition:all .2s;user-select:none}
.gbtn.on{border-color:var(--g);background:var(--g);color:#fff;font-weight:700}
.cnote{background:#f0fbf5;border:1px solid var(--g);border-radius:8px;padding:7px 11px;font-size:.72rem;color:var(--mu);line-height:1.7;margin-bottom:10px}
.cnote span{color:var(--g);font-weight:700}
.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cpick{width:32px;height:32px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:all .2s}
.cpick.on{border-color:var(--dk);transform:scale(1.1)}
.clrow{display:flex;gap:7px;margin-bottom:13px}
.clbtn{flex:1;padding:8px;border:1.5px solid var(--br);border-radius:8px;background:#fafafa;font-family:"Tajawal",sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--mu);text-align:center;transition:all .2s;user-select:none}
.clbtn.on{border-color:var(--g);background:var(--g);color:#fff}
.arow{display:flex;gap:9px}
.btn-p{flex:1;padding:12px;background:var(--dk);color:#fff;border:none;border-radius:9px;font-family:"Tajawal",sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-p:hover{background:#333}
.btn-e{flex:1;padding:12px;background:var(--g);color:#fff;border:none;border-radius:9px;font-family:"Tajawal",sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-e:hover{background:#008a4d}
.psec{margin-top:4px;display:none}
.plbl{font-size:.71rem;font-weight:700;color:var(--mu);margin-bottom:10px}
.pwrap{display:flex;justify-content:center}
.card-outer{width:100%;max-width:500px;border-radius:14px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.1);position:relative}
.card-svg{width:100%;display:block}
.card-ov{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;padding:5% 6.5% 5%}
.card-ov.ar{direction:rtl}
.card-ov.en{direction:ltr}
.c-logo-row{width:100%;display:flex;justify-content:flex-end;margin-bottom:4%;direction:ltr}
.c-logo{height:auto;max-height:24px;width:auto}
.c-intro{font-size:clamp(12px,2.3vw,14px);color:#555;text-align:center;margin-bottom:3%;width:100%}
.c-title{font-family:"Amiri",serif;font-size:clamp(22px,5vw,32px);font-weight:400;font-style:italic;color:#1a1a1a;line-height:1.3;text-align:center;margin-bottom:3%;width:100%}
.c-title-en{font-family:"Amiri",serif;font-style:italic;font-size:clamp(18px,4vw,26px);font-weight:400;color:#1a1a1a;line-height:1.3;text-align:center;margin-bottom:3%;width:100%}
.c-ayah{font-family:"Amiri",serif;font-size:clamp(12px,2.4vw,15px);color:#1a1a1a;line-height:2.1;text-align:center;margin-bottom:3%;width:100%}
.c-ayah-en{font-family:"Amiri",serif;font-style:italic;font-size:clamp(11px,2.1vw,14px);color:#333;line-height:1.9;text-align:center;margin-bottom:3%;width:100%}
.c-sub{font-size:clamp(11px,2.1vw,13px);color:#333;line-height:1.9;white-space:pre-line;text-align:center;margin-bottom:3%;width:100%}
.c-divider{width:28px;height:1.5px;background:rgba(0,0,0,.12);margin:2% auto;flex-shrink:0}
.c-sub2{font-family:"Amiri",serif;font-style:italic;font-size:clamp(11px,2.1vw,14px);color:#666;text-align:center;width:100%;margin-bottom:2%}
.c-sender{text-align:center;padding-top:2%;border-top:1px solid rgba(0,0,0,.09);margin-top:auto;width:100%}
.c-sender-lbl{font-size:clamp(9px,1.7vw,11px);color:#999}
.c-sender-name{font-size:clamp(13px,2.5vw,16px);font-weight:700;color:#1a1a1a;margin-top:.5%}
.c-sender-title{font-size:clamp(9px,1.7vw,11px);color:#666;margin-top:.3%}
.c-sender-co{font-size:clamp(8px,1.5vw,10px);color:#aaa;margin-top:.3%;direction:ltr;display:inline-block}
.c-body{font-size:clamp(11px,2.1vw,13px);color:#222;line-height:1.9;text-align:center;margin-bottom:3%;width:100%}
.c-body strong{font-weight:700}
.c-contact{font-size:clamp(10px,1.8vw,12px);color:#666;line-height:1.9;text-align:center;padding-top:2%;border-top:1px solid rgba(0,0,0,.09);margin-top:auto;width:100%}
.c-contact strong{display:block;font-size:clamp(10px,1.9vw,12px);color:#1a1a1a;margin-bottom:.3%}
.c-aware-title{font-family:"Amiri",serif;font-size:clamp(20px,4.5vw,28px);font-weight:400;font-style:italic;color:#1a1a1a;line-height:1.3;text-align:center;margin-bottom:3%;width:100%}
.c-aware-body{font-size:clamp(11px,2.1vw,13px);color:#222;line-height:1.95;text-align:center;margin-bottom:3%;width:100%}
.c-aware-sub{font-size:clamp(10px,1.9vw,12px);font-weight:700;text-align:center;width:100%}
.c-admin-title{font-family:"Amiri",serif;font-size:clamp(18px,4vw,26px);font-weight:400;font-style:italic;color:#1a1a1a;line-height:1.3;text-align:center;margin-bottom:2%;width:100%}
.c-admin-dates{font-size:clamp(12px,2.3vw,15px);text-align:center;margin-bottom:3%;font-weight:700;width:100%}
.c-admin-body{font-size:clamp(11px,2.1vw,13px);color:#222;line-height:1.95;text-align:center;margin-bottom:3%;width:100%}
.c-admin-sub{font-size:clamp(10px,1.8vw,12px);color:#666;text-align:center;width:100%}
.c-mid{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;width:100%}
.c-footer{text-align:center;padding-top:2%;border-top:1px solid rgba(0,0,0,.1);width:100%;flex-shrink:0}
.c-footer-name{font-size:clamp(11px,2.1vw,13px);font-weight:700;color:#1a1a1a}
.c-footer-sub{font-size:clamp(8px,1.5vw,10px);color:#aaa;direction:ltr;display:inline-block}
.c-footer-sub-ar{font-size:clamp(8px,1.5vw,10px);color:#aaa;font-family:"Tajawal",sans-serif}
.c-custom-title{font-family:"Amiri",serif;font-size:clamp(20px,4.5vw,28px);font-weight:700;line-height:1.3;text-align:center;margin-bottom:3%;width:100%}
.c-custom-sub{font-family:"Amiri",serif;font-style:italic;font-size:clamp(14px,2.7vw,18px);line-height:1.4;text-align:center;margin-bottom:3%;width:100%}
.c-custom-body{font-size:clamp(11px,2.1vw,13px);line-height:2;text-align:center;margin-bottom:3%;width:100%}
.c-custom-note{font-size:clamp(10px,1.8vw,12px);text-align:center;color:#666;width:100%}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--br);text-align:center;padding:7px;font-size:9px;color:#aaa;z-index:50;font-family:"Tajawal",sans-serif}

@media(max-width:600px){
  .hdr{padding:10px 14px}
  .hdr-logo{height:20px}
  .main{padding:16px 12px 80px}
  .cat-tabs{gap:5px}
  .ct{padding:6px 12px;font-size:.75rem}
  .occ-grid{grid-template-columns:1fr 1fr;gap:6px}
  .occ-name{font-size:.74rem}
  .fc{padding:14px}
  .arow{flex-direction:column}
  .card-outer{max-width:100%}
  .c-logo{max-height:18px}
}
</style>
</head>

<body>
<div class="hdr">
  <img class="hdr-logo" id="hlogo" alt="AECOM"/>
  <div class="ltog">
    <button class="lbtn on" onclick="setLang('ar')">AR</button>
    <button class="lbtn" onclick="setLang('en')">EN</button>
  </div>
</div>
<div class="main">
  <div class="slbl" id="l_cat">اختر القسم</div>
  <div class="cat-tabs">
    <div class="ct on" id="ct_greet" onclick="setCat('greet')">تهنئة</div>
    <div class="ct" id="ct_condolence" onclick="setCat('condolence')">تعزية</div>
    <div class="ct" id="ct_aware" onclick="setCat('aware')">توعية</div>
    <div class="ct" id="ct_admin" onclick="setCat('admin')">إداري</div>
    <div class="ct" id="ct_custom" onclick="setCat('custom')">مخصص</div>
  </div>
  <div class="slbl" id="l_occ">اختر المناسبة</div>
  <div class="occ-grid" id="occ_grid"></div>
  <div class="fc">
    <div class="fc-title" id="fc_title">اختر مناسبة أولاً</div>
    <div id="sw" style="display:none">
      <div class="srow">
        <div class="sbtn on" id="sb_a" onclick="setSender('a')">من ايكوم</div>
        <div class="sbtn" id="sb_e" onclick="setSender('e')">من موظف</div>
      </div>
    </div>
    <div id="ef" style="display:none">
      <div class="field"><label id="lsn">اسمك</label><input id="sname" placeholder="مثال: سارة الغامدي"/></div>
      <div class="field"><label id="lst">المسمى الوظيفي</label><input id="stitle" placeholder="Document Controller"/></div>
      <div class="field"><label id="lgg">الجنس</label>
        <div class="grow-row">
          <div class="gbtn on" id="gmg" onclick="setGG('m')">ذكر</div>
          <div class="gbtn" id="gfg" onclick="setGG('f')">أنثى</div>
        </div>
      </div>
    </div>
    <div id="cf" style="display:none">
      <div class="field"><label id="lcol">اسم الزميل</label><input id="colname" placeholder="مثال: محمد العتيبي"/></div>
      <div class="field"><label id="lgc">جنس الزميل</label>
        <div class="grow-row">
          <div class="gbtn on" id="gmc" onclick="setGC('m')">Male / هو</div>
          <div class="gbtn" id="gfc" onclick="setGC('f')">Female / هي</div>
        </div>
      </div>
      <div class="field"><label id="lrel">صلة المتوفى</label><select id="rel" onchange="updNote()"></select></div>
      <div class="cnote" id="cnote"></div>
      <div class="field"><label id="lcn">اسم جهة التواصل</label><input id="cname" placeholder="اسم الشخص"/></div>
      <div class="field"><label id="lem">إيميل</label><input id="cemail" type="email" placeholder="example@aecom.com"/></div>
      <div class="field"><label id="lph">جوال</label><input id="cphone" placeholder="+966 5X XXX XXXX"/></div>
    </div>
    <div id="cuf" style="display:none">
      <div class="field"><label id="lcu_title">العنوان</label><input id="cu_title" placeholder="مثال: إعلان هام"/></div>
      <div class="field"><label id="lcu_sub">السب عنوان</label><input id="cu_sub" placeholder="مثال: تنبيه لجميع الموظفين"/></div>
      <div class="field"><label id="lcu_body">النص الرئيسي</label><textarea id="cu_body" placeholder="اكتب النص هنا..."></textarea></div>
      <div class="field"><label id="lcu_note">النص الصغير</label><input id="cu_note" placeholder="مثال: للاستفسار تواصل مع الموارد البشرية"/></div>
      <div class="field"><label id="lcu_color">لون البطاقة</label><div class="color-grid" id="color_grid"></div></div>
    </div>
    <div class="field">
      <label id="lcard">لغة البطاقة</label>
      <div class="clrow">
        <div class="clbtn on" id="cl_ar" onclick="setCL('ar')">عربي</div>
        <div class="clbtn" id="cl_en" onclick="setCL('en')">English</div>
      </div>
    </div>
    <div class="arow">
      <button class="btn-p" id="btn_p" onclick="gen()">معاينة البطاقة</button>
      <button class="btn-e" id="btn_e" onclick="expPNG()">تصدير PNG</button>
    </div>
  </div>
  <div class="psec" id="psec">
    <div class="plbl" id="l_prev">المعاينة</div>
    <div class="pwrap">
      <div class="card-outer" id="card_outer">
        <svg class="card-svg" id="card_svg" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="card-ov ar" id="card_ov"></div>
      </div>
    </div>
  </div>
</div>
<div class="footer">صُمِّمت بواسطة نورة اللحياني &mdash; AECOM Saudi Arabia &copy; 2026</div>

function buildGrid(){

  var ar=ul==="ar";
  var items=D.occ[cat]||[];
  items.forEach(function(o){
    var d=document.createElement("div");

function buildColorGrid(){
  var g=el("color_grid");g.innerHTML="";
  D.brand_colors.forEach(function(c){
    var d=document.createElement("div");
    d.className="cpick"+(c.val===custColor?" on":"");

    d.title=ul==="ar"?c.name_ar:c.name_en;
    d.onclick=(function(cv){return function(){custColor=cv;buildColorGrid();};})(c.val);

function updNote(){
  var rel=el("rel").value,isSelf=rel==="self_male"||rel==="self_female",ar=ul==="ar";
  el("cnote").innerHTML=isSelf?(ar?"جهة التواصل: <span>أحد من أهل الزميل المتوفى</span>":"Contact: <span>family of the deceased</span>"):(ar?"جهة التواصل: <span>الزميل نفسه للمواساة</span>":"Contact: <span>the colleague</span>");
}

function dG(rel){return["self_male","father","husband","brother","son"].includes(rel)?"m":"f";}

function logoRow(){
  return '<div class="c-logo-row"><img class="c-logo" src="'+LB+'" alt="AECOM"/></div>';
}

function render(svg,inner,bg){
  el("card_svg").innerHTML=svg;
  el("card_ov").innerHTML=logoRow()+inner;
  el("card_ov").className="card-ov "+(cl==="en"?"en":"ar");
  curBG=bg;
  el("psec").style.display="block";
  setTimeout(function(){el("psec").scrollIntoView({behavior:"smooth",block:"start"});},100);
}

function gen(){
  if(cat==="custom"){genCustom();return;}
  if(!occ){alert(ul==="ar"?"اختر مناسبة أولاً":"Please select an occasion first");return;}
  if(cat==="greet")genGreet();
  else if(cat==="condolence")genCond();
  else if(cat==="aware")genAware();
  else if(cat==="admin")genAdmin();
}

function genGreet(){
  var id=occ.id,d=D.greet[id];if(!d)return;
  var ar=cl==="ar",emp=sender==="e";
  var intro=ar?(emp?d.ar_ie:d.ar_ia):(emp?d.en_ie:d.en_ia);
  var title=ar?d.ar_t:d.en_t;
  var sub=(ar?d.ar_s:d.en_s).replace(/\n/g,"<br/>");
  var sub2=ar?d.ar_s2:d.en_s2;
  var sn=el("sname").value.trim()||"AECOM";
  var st=el("stitle").value.trim()||"";
  var slbl=ar?(gg==="f"?"أختكم / زميلتكم":"أخوكم / زميلكم"):(gg==="f"?"Sincerely,":"Regards,");
  var tc=ar?"c-title":"c-title-en";
  var mid='<div class="c-mid">';
  mid+='<div class="c-intro">'+intro+'</div>';
  mid+='<div class="'+tc+'">'+title+'</div>';
  mid+='<div class="c-sub">'+sub+'</div>';
  mid+='<div class="c-divider"></div>';
  mid+='<div class="c-sub2">'+sub2+'</div>';
  mid+='</div>';
  var ftr=emp?'<div class="c-footer"><div class="c-sender-lbl">'+slbl+'</div><div class="c-sender-name">'+sn+'</div>'+(st?'<div class="c-sender-title">'+st+'</div>':'')+'<div class="c-sender-co">AECOM Saudi Arabia</div></div>':'<div class="c-footer"><div class="c-footer-name">AECOM Saudi Arabia</div><div class="c-footer-sub">DELIVERING A BETTER WORLD.</div></div>';
  render(D.decors[id]||D.decors.condolence,mid+ftr,d.bg);
}

function genCond(){
  var rel=el("rel").value,col=el("colname").value.trim()||"--";
  var cn=el("cname").value.trim()||"--",ce=el("cemail").value.trim()||"--",cp=el("cphone").value.trim()||"--";
  var dg=dG(rel),isSelf=rel==="self_male"||rel==="self_female";
  var ar=cl==="ar";
  var mid='<div class="c-mid">';
  if(ar){
    var rooh=dg==="f"?"\u0631\u0648\u062d\u0647\u0627":"\u0631\u0648\u062d\u0647";
    var yas=dg==="f"?"\u064a\u0633\u0643\u0646\u0647\u0627":"\u064a\u0633\u0643\u0646\u0647";
    var yaj=dg==="f"?"\u0648\u064a\u062c\u0632\u064a\u0647\u0627":"\u0648\u064a\u062c\u0632\u064a\u0647";
    var ahl=dg==="f"?"\u0623\u0647\u0644\u0647\u0627 \u0648\u0630\u0648\u064a\u0647\u0627":"\u0623\u0647\u0644\u0647 \u0648\u0630\u0648\u064a\u0647";
    var clab=gc==="f"?"\u0632\u0645\u064a\u0644\u062a\u0646\u0627":"\u0632\u0645\u064a\u0644\u0646\u0627";
    mid+='<div class="c-ayah">\u064a\u064e\u0627 \u0623\u064e\u064a\u064e\u0651\u062a\u064f\u0647\u064e\u0627 \u0627\u0644\u0646\u064e\u0651\u0641\u0652\u0633\u064f \u0627\u0644\u0652\u0645\u064f\u0637\u0652\u0645\u064e\u0626\u0650\u0646\u064e\u0651\u0629\u064f \u0627\u0631\u0652\u062c\u0650\u0639\u0650\u064a \u0625\u0650\u0644\u064e\u0649\u0670 \u0631\u064e\u0628\u0651\u0650\u0643\u0650 \u0631\u064e\u0627\u0636\u0650\u064a\u064e\u0629\u064b \u0645\u064e\u0651\u0631\u0652\u0636\u0650\u064a\u064e\u0651\u0629\u064b \u0641\u064e\u0627\u062f\u0652\u062e\u064f\u0644\u0650\u064a \u0641\u0650\u064a \u0639\u0650\u0628\u064e\u0627\u062f\u0650\u064a \u0648\u064e\u0627\u062f\u0652\u062e\u064f\u0644\u0650\u064a \u062c\u064e\u0646\u064e\u0651\u062a\u0650\u064a</div>';
    var pfx="\u0628\u0650\u0628\u0627\u0644\u0650\u063a\u0650 \u0627\u0644\u0623\u0633\u0649 \u0648\u0642\u0644\u0648\u0628 \u0645\u0624\u0645\u0646\u0629 \u0628\u0642\u0636\u0627\u0621 \u0627\u0644\u0644\u0647 \u0648\u0642\u062f\u0631\u0647\u060c \u062a\u0646\u0639\u0649 <strong>\u0627\u064a\u0643\u0648\u0645 \u0627\u0644\u0633\u0639\u0648\u062f\u064a\u0629</strong> \u0648\u0641\u0627\u0629 ";
    var sfx=". \u0646\u0633\u0623\u0644 \u0627\u0644\u0644\u0647 \u0623\u0646 \u064a\u062a\u063a\u0645\u062f "+rooh+" \u0628\u0648\u0627\u0633\u0639 \u0631\u062d\u0645\u062a\u0647\u060c "+yas+" \u0641\u0633\u064a\u062d \u062c\u0646\u0627\u0646\u0647 "+yaj+" \u062e\u064a\u0631 \u0627\u0644\u062c\u0632\u0627\u0621\u060c \u0648\u0623\u0646 \u064a\u0644\u0647\u0645 "+ahl+" \u0627\u0644\u0635\u0628\u0631 \u0648\u0627\u0644\u0633\u0644\u0648\u0627\u0646.";
    var body=isSelf?pfx+clab+" <strong>"+col+"</strong>"+sfx:pfx+"<strong>"+D.RA[rel]+"</strong> "+clab+" <strong>"+col+"</strong>"+sfx;
    mid+='<div class="c-body">'+body+'</div>';
    mid+='</div>';
    var lbl=isSelf?"\u0644\u0644\u062a\u0648\u0627\u0635\u0644 \u0645\u0639 \u0623\u0647\u0644 \u0627\u0644\u0641\u0642\u064a\u062f:":"\u0644\u0644\u062a\u0648\u0627\u0635\u0644 \u0645\u0639 \u0627\u0644\u0632\u0645\u064a\u0644:";
    var ftr='<div class="c-footer"><div class="c-footer-name" style="font-size:clamp(10px,1.9vw,12px)">'+lbl+'</div><div style="font-size:clamp(10px,1.9vw,12px);color:#444;margin-top:1%">'+cn+'</div><div style="font-size:clamp(9px,1.7vw,11px);color:#777">'+ce+'</div><div style="font-size:clamp(9px,1.7vw,11px);color:#777">'+cp+'</div></div>';
    render(D.decors.condolence,mid+ftr,"#F5F5F5");
  }else{
    var pr=dg==="f"?"her":"his",prC=dg==="f"?"Her":"His";
    mid+='<div class="c-ayah-en">&ldquo;O tranquil soul, return to your Lord, well-pleased and pleasing to Him. Enter among My servants, and enter My Paradise.&rdquo;</div>';
    var pfxE="With deep sorrow, <strong>AECOM Saudi Arabia</strong> mourns the passing of ";
    var sfxE=" May Allah envelop "+pr+" in His vast mercy, grant "+pr+" a place in His Paradise, and inspire "+prC+" family with patience.";
    var bodyE=isSelf?pfxE+"our colleague <strong>"+col+"</strong>."+sfxE:pfxE+D.RE[rel]+" <strong>"+col+"</strong>."+sfxE;
    mid+='<div class="c-body">'+bodyE+'</div>';
    mid+='</div>';
    var lblE=isSelf?"For condolences (family):":"For condolences (colleague):";
    var ftr='<div class="c-footer"><div class="c-footer-name" style="font-size:clamp(10px,1.9vw,12px)">'+lblE+'</div><div style="font-size:clamp(10px,1.9vw,12px);color:#444;margin-top:1%">'+cn+'</div><div style="font-size:clamp(9px,1.7vw,11px);color:#777">'+ce+'</div><div style="font-size:clamp(9px,1.7vw,11px);color:#777">'+cp+'</div></div>';
    render(D.decors.condolence,mid+ftr,"#F5F5F5");
  }
}

  var id=occ.id,d=D.aware[id];if(!d)return;
  var ar=cl==="ar",bar=d.bar;
  var title=ar?d.ar_t:d.en_t;
  var body=(ar?d.ar_s:d.en_s).replace(/\n/g,"<br/>");
  var sub=ar?d.ar_sub:d.en_sub;
  var ftrsub=ar?'<div class="c-footer-sub-ar">\u0627\u0644\u0645\u0648\u0627\u0631\u062f \u0627\u0644\u0628\u0634\u0631\u064a\u0629</div>':'<div class="c-footer-sub">DELIVERING A BETTER WORLD.</div>';
  var mid='<div class="c-mid">';
  mid+='<div class="c-aware-title">'+title+'</div>';

}

function genCustom(){
  var ar=cl==="ar";
  var title=el("cu_title").value.trim()||(ar?"\u0627\u0644\u0639\u0646\u0648\u0627\u0646":"Title");
  var sub=el("cu_sub").value.trim()||(ar?"\u0627\u0644\u0633\u0628 \u0639\u0646\u0648\u0627\u0646":"Subtitle");
  var body=(el("cu_body").value.trim()||(ar?"\u0627\u0644\u0646\u0635 \u0627\u0644\u0631\u0626\u064a\u0633\u064a":"Main text")).replace(/\n/g,"<br/>");
  var note=el("cu_note").value.trim()||(ar?"\u0646\u0635 \u0635\u063a\u064a\u0631":"Small note");
  var c=custColor;
  var bgMap={"#00AB61":"#E8F5EE","#009A9B":"#E8F6F5","#B2B1A7":"#F2F2F2","#FFCE00":"#FDF8E8","#E52713":"#FBF0F0","#C81A78":"#FBF0F6"};
  var bg=bgMap[c]||"#F0F0F0";
  var svgD='<rect width="1080" height="1350" fill="'+bg+'"/><circle cx="900" cy="120" r="200" fill="'+c+'" opacity="0.08"/><circle cx="180" cy="1230" r="160" fill="'+c+'" opacity="0.06"/><circle cx="540" cy="675" r="320" fill="'+c+'" opacity="0.04"/><rect x="0" y="1318" width="1080" height="32" fill="'+c+'"/>';
  var ftrsub=ar?'<div class="c-footer-sub-ar">\u0627\u0644\u0645\u0648\u0627\u0631\u062f \u0627\u0644\u0628\u0634\u0631\u064a\u0629</div>':'<div class="c-footer-sub">DELIVERING A BETTER WORLD.</div>';
  var mid='<div class="c-mid">';
  mid+='<div class="c-custom-title" style="color:'+c+'">'+title+'</div>';
  mid+='<div class="c-custom-sub">'+sub+'</div>';
  mid+='<div class="c-divider" style="background:'+c+'"></div>';
  mid+='<div class="c-custom-body">'+body+'</div>';
  mid+='<div class="c-custom-note">'+note+'</div>';
  mid+='</div>';
  var ftr='<div class="c-footer"><div class="c-footer-name">AECOM Saudi Arabia</div>'+ftrsub+'</div>';
  render(svgD,mid+ftr,bg);
}

function expPNG(){
  if(el("psec").style.display==="none"){alert(ul==="ar"?"اضغط معاينة أولاً":"Click Preview first");return;}
  var co=el("card_outer");
  html2canvas(co,{scale:2,useCORS:true,allowTaint:true,backgroundColor:curBG,logging:false})
    .then(function(c){var a=document.createElement("a");a.download="AECOM-announcement.png";a.href=c.toDataURL("image/png");a.click();})
    .catch(function(e){console.error(e);alert(ul==="ar"?"خطأ في التصدير":"Export error");});
}

setLang("ar");setCat("greet");setSender("a");updNote();buildColorGrid();
